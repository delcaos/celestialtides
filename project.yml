name: CelestialTides
options:
  bundleIdPrefix: com.example
targets:
  CelestialTides:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CelestialTidesApp
    dependencies:
      - target: CelestialTidesWidgetExtension
    entitlements:
      path: CelestialTidesApp/CelestialTidesApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.delcaos.celestialtides
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleName: "Celestial Tides"
      INFOPLIST_KEY_CFBundleDisplayName: "Celestial Tides"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Celestial Tides uses your location to estimate tides from sun/moon geometry and Earth-Sun distance. Results are approximate and may differ from local stations."
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  CelestialTidesWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CelestialTidesWidget
      - path: CelestialTidesApp/TideModels.swift
      - path: CelestialTidesApp/TideCalculations.swift
      - path: CelestialTidesApp/TideCalculations+Astronomy.swift
      - path: CelestialTidesApp/TideCalculations+Forecast.swift
      - path: CelestialTidesApp/TideConfiguration.swift
      - path: CelestialTidesApp/TideRuntime.swift
      - path: CelestialTidesApp/TideCalibration.swift
      - path: CelestialTidesApp/SharedDefaults.swift
      - path: CelestialTidesApp/TimeZoneSelection.swift
      - path: CelestialTidesApp/TideChart.swift
      - path: CelestialTidesApp/TideChartMath.swift
      - path: CelestialTidesApp/MidnightLinesView.swift
      - path: CelestialTidesApp/TidePathView.swift
      - path: CelestialTidesApp/ExtremaBadgesView.swift
      - path: CelestialTidesApp/MoonUpIntervalsView.swift
    info:
      path: CelestialTidesWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: CelestialTidesWidget/CelestialTidesWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.delcaos.celestialtides
    settings:
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_KEY_CFBundleName: "Celestial Tides"
      INFOPLIST_KEY_CFBundleDisplayName: "Celestial Tides"
      PRODUCT_BUNDLE_IDENTIFIER: app.delcaos.celestialtides.CelestialTidesWidgetExtension
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      EXCLUDED_ARCHS: ""
