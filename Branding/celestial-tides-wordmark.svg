<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="600" viewBox="0 0 1800 600" role="img" aria-labelledby="title desc">
  <title id="title">Celestial Tides Wordmark</title>
  <desc id="desc">Celestial Tides brand wordmark with ocean emblem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02101D"/>
      <stop offset="100%" stop-color="#074764"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8FEFF"/>
      <stop offset="100%" stop-color="#8CEEFF"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9FBFF"/>
      <stop offset="100%" stop-color="#84E9FF"/>
    </linearGradient>
  </defs>

  <rect width="1800" height="600" fill="url(#bg)"/>

  <g transform="translate(110 78)">
    <circle cx="220" cy="220" r="182" fill="#0A3B55"/>
    <circle cx="220" cy="220" r="172" fill="none" stroke="url(#ring)" stroke-width="18"/>
    <circle cx="304" cy="145" r="36" fill="#D0F8FF"/>
    <circle cx="320" cy="133" r="30" fill="#0A4D68"/>
    <path d="M77 257 C128 223 186 211 236 220 C286 229 338 271 381 264"
          fill="none" stroke="url(#ink)" stroke-width="29" stroke-linecap="round"/>
    <path d="M99 316 C152 283 209 273 259 284 C302 294 341 325 367 322"
          fill="none" stroke="url(#ink)" stroke-width="22" stroke-linecap="round"/>
  </g>

  <text x="560" y="265"
        fill="url(#ink)"
        font-family="Avenir Next, Helvetica Neue, Arial, sans-serif"
        font-size="120"
        font-weight="700"
        letter-spacing="2">CELESTIAL</text>
  <text x="560" y="410"
        fill="url(#ink)"
        font-family="Avenir Next, Helvetica Neue, Arial, sans-serif"
        font-size="132"
        font-weight="800"
        letter-spacing="3">TIDES</text>
</svg>
