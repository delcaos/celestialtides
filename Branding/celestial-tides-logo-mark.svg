<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Celestial Tides Logo Mark</title>
  <desc id="desc">A moon and wave emblem over deep ocean gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02101D"/>
      <stop offset="50%" stop-color="#063550"/>
      <stop offset="100%" stop-color="#0A6A8E"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#94EEFF" stop-opacity="0.65"/>
      <stop offset="45%" stop-color="#61DFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#61DFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BFF8FF"/>
      <stop offset="100%" stop-color="#7CE6FF"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D6FDFF"/>
      <stop offset="100%" stop-color="#8CEEFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#01101A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="316" fill="#083D58" fill-opacity="0.5"/>
    <circle cx="512" cy="512" r="300" fill="none" stroke="url(#ring)" stroke-width="26"/>

    <circle cx="650" cy="385" r="62" fill="#D0F8FF"/>
    <circle cx="675" cy="367" r="53" fill="#0A4D68"/>

    <path d="M246 575 C327 522 429 505 512 522 C598 541 698 613 783 603"
          fill="none" stroke="url(#wave)" stroke-width="50" stroke-linecap="round"/>
    <path d="M276 654 C364 600 460 584 544 603 C625 623 702 683 752 673"
          fill="none" stroke="url(#wave)" stroke-opacity="0.95" stroke-width="42" stroke-linecap="round"/>
    <path d="M334 720 C416 674 507 664 584 684 C641 699 693 737 724 744"
          fill="none" stroke="url(#wave)" stroke-opacity="0.85" stroke-width="30" stroke-linecap="round"/>
  </g>
</svg>
